<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name">

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div class="weather-card">

            <img id="weatherIcon"
                 src=""
                 alt="Weather Icon">

            <h2 id="cityName">
                Bangalore
            </h2>

            <h3 id="temperature">
                25°C
            </h3>

            <p id="condition">
                Cloudy
            </p>

            <p id="humidity">
                Humidity: 70%
            </p>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
